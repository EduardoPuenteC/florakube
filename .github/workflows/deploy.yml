name: FloraKube CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  construir-y-desplegar:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Obtener el código del repositorio
        uses: actions/checkout@v4

      - name: 🔑 Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          # Aquí GitHub toma el valor de tus Secrets automáticamente
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 📦 Construir y Subir Imagen de la API
        run: |
          docker build -t eduardopuentec/florakube-api:latest ./api_inventario
          docker push eduardopuentec/florakube-api:latest

      - name: 🤖 Construir y Subir Imagen del Bot (Dispatcher)
        run: |
          docker build -t eduardopuentec/florakube-bot:latest ./dispatcher
          docker push eduardopuentec/florakube-bot:latest

      - name: ⏰ Construir y Subir Imagen del Scheduler
        run: |
          docker build -t eduardopuentec/florakube-scheduler:latest ./scheduler
          docker push eduardopuentec/florakube-scheduler:latest

      - name: 🔌 Conectar con el Clúster de DigitalOcean
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_SECRET }}

      - name: 🚀 Actualizar Aplicaciones en Kubernetes
        run: |
          kubectl rollout restart deployment api-inventario-deployment
          kubectl rollout restart deployment dispatcher-bot-deployment
